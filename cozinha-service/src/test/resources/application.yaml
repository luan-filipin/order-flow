spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        check_nullability: false

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  liquibase:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: cozinha-service-test

kafka:
  topic:
    pedido-criado: pedido-criado
    pedido-finalizado: pedido-finalizado
